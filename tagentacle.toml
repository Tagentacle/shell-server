[package]
name = "shell_mcp"
version = "0.2.0"
description = "MCP Server providing exec_command (TACL space / container / local)"
authors = ["Tagentacle Contributors"]
type = "executable"

[entry_points]
node = "shell_mcp:main"

[dependencies]
python = ["tagentacle-py-mcp"]
# Container runtime is optional — only needed when TARGET_CONTAINER is set
# Install ONE of: pip install podman  OR  pip install docker
# system = ["podman"]
